# This is a basic workflow to help you get started with Actions

name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "master" branch
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Authenticate to GitHub Packages (NuGet)
        run: >
          dotnet nuget update source "weixinrui GitHub Packages"
          --username "${{ github.actor }}"
          --password "${{ secrets.WEIXINRUI_TOKEN }}"
          --store-password-in-clear-text
          --configfile "./nuget.config"

      # Runs a single command using the runners shell
      - name: Restore
        run: dotnet restore --configfile "./nuget.config" ./VARSP-migration-fake.csproj

      # Runs a set of commands using the runners shell
      - name: Build
        run: dotnet publish ./VARSP-migration-fake.csproj -c Release

      - name: Archive production artifacts
        uses: actions/upload-artifact@v4
        with:
          name: production-artifacts
          path: ./bin/Release/net10.0/publish/

      - name: Unit tests + coverage
        run: >
          dotnet test ./VARSP-migration-fake.Tests/VARSP-migration-fake.Tests.csproj
          -c Release
          --collect:"XPlat Code Coverage"
          --results-directory ./TestResults
          --verbosity normal

      - name: Install reportgenerator
        run: |
          dotnet tool install -g dotnet-reportgenerator-globaltool
          echo "$HOME/.dotnet/tools" >> $GITHUB_PATH

      - name: Generate HTML coverage report
        run: >
          reportgenerator
          -reports:"TestResults/**/coverage.cobertura.xml"
          -targetdir:"coveragereport"
          -reporttypes:"Html;Cobertura"

      - name: Archive coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            coveragereport
            TestResults/**/coverage.cobertura.xml
